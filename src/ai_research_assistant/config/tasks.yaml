research_task:
  description: >
    Research the topic: {topic}.
    Focus on:
    - Market overview
    - Key competitors
    - Current and rising trends
  expected_output: >
    A detailed research summary. Use {language}.

analysis_task:
  description: >
    Analyze the research and identify:
    - Market size
    - Key competitors
    - Trends and opportunities
  expected_output: >
    Structured analysis. Use {language}.

strategy_task:
  description: >
    Based on the analysis, provide:
    - Opportunities
    - Risks
    - Strategic recommendations
  expected_output: >
    Actionable strategy. Use {language}.

report_task:
  description: >
    Combine everything into a structured report with headings:
    - Overview
    - Market Analysis
    - Strategy
    - Conclusion
  expected_output: >
    Final professional report. Use {language}.
